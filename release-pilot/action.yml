name: "release-pilot"
description: "Orchestrate releases with AI-powered release notes"
inputs:
  anthropic-api-key:
    description: "Anthropic API key"
    required: true
  model:
    description: "Claude model to use"
    required: false
    default: "claude-sonnet-4-6"
  sign:
    description: "Sign release artifacts with cosign"
    required: false
    default: "false"
  draft:
    description: "Create draft release"
    required: false
    default: "false"
  prerelease:
    description: "Mark as prerelease"
    required: false
    default: "false"
  include-diffs:
    description: "Include full diffs in AI prompt"
    required: false
    default: "false"
  args:
    description: "Additional CLI arguments"
    required: false
    default: ""
outputs:
  version:
    description: "Released version"
    value: ${{ steps.release.outputs.version }}
  tag:
    description: "Git tag created"
    value: ${{ steps.release.outputs.tag }}
  release-url:
    description: "GitHub release URL"
    value: ${{ steps.release.outputs.release-url }}
  release-notes:
    description: "Generated release notes"
    value: ${{ steps.release.outputs.release-notes }}
runs:
  using: "composite"
  steps:
    - name: Install release-pilot
      shell: bash
      env:
        ACTION_PATH: ${{ github.action_path }}
      run: bash "$ACTION_PATH/install.sh"

    - name: Run release-pilot
      id: release
      shell: bash
      env:
        ANTHROPIC_API_KEY: ${{ inputs.anthropic-api-key }}
        RELEASE_PILOT_MODEL: ${{ inputs.model }}
        GITHUB_TOKEN: ${{ github.token }}
        INPUT_SIGN: ${{ inputs.sign }}
        INPUT_DRAFT: ${{ inputs.draft }}
        INPUT_PRERELEASE: ${{ inputs.prerelease }}
        INPUT_INCLUDE_DIFFS: ${{ inputs.include-diffs }}
        INPUT_ARGS: ${{ inputs.args }}
      run: |
        set -Eeuo pipefail
        ARGS=("ship")
        if [[ "$INPUT_SIGN" == "true" ]]; then
          ARGS+=("--sign")
        fi
        if [[ "$INPUT_DRAFT" == "true" ]]; then
          ARGS+=("--draft")
        fi
        if [[ "$INPUT_PRERELEASE" == "true" ]]; then
          ARGS+=("--prerelease")
        fi
        if [[ "$INPUT_INCLUDE_DIFFS" == "true" ]]; then
          ARGS+=("--include-diffs")
        fi
        if [[ -n "$INPUT_ARGS" ]]; then
          read -ra extra <<< "$INPUT_ARGS"
          ARGS+=("${extra[@]}")
        fi
        release-pilot "${ARGS[@]}"

name: Go CI

on:
  workflow_call:
    inputs:
      go-version:
        description: "Go version to use (default: reads go.mod)"
        type: string
        required: false
        default: ""
      lint-version:
        description: "golangci-lint v2.x version"
        type: string
        required: false
        default: "latest"
      run-race:
        description: "Enable race detector in tests"
        type: boolean
        required: false
        default: true
      codecov:
        description: "Upload coverage to Codecov"
        type: boolean
        required: false
        default: false
    secrets:
      codecov-token:
        required: false

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Set up Go
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version: ${{ inputs.go-version || null }}
          go-version-file: go.mod

      - name: Build
        run: go build ./...

  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Set up Go
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version: ${{ inputs.go-version || null }}
          go-version-file: go.mod

      - name: Test
        env:
          RUN_RACE: ${{ inputs.run-race }}
        run: |
          set -Eeuo pipefail
          RACE_FLAG=""
          if [[ "$RUN_RACE" == "true" ]]; then
            RACE_FLAG="-race"
          fi
          go test -v ${RACE_FLAG} -coverprofile=coverage.out ./...

      - name: Upload coverage
        if: inputs.codecov
        uses: codecov/codecov-action@57e3a136b779b570ffcdbf80b3bdc90e7fab3de2 # v6.0.0
        with:
          files: coverage.out
          fail_ci_if_error: false
          token: ${{ secrets.codecov-token }}

  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Set up Go
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version: ${{ inputs.go-version || null }}
          go-version-file: go.mod

      - name: Install golangci-lint
        env:
          LINT_VERSION: ${{ inputs.lint-version }}
        run: go install "github.com/golangci/golangci-lint/v2/cmd/golangci-lint@${LINT_VERSION}"

      - name: golangci-lint
        run: golangci-lint run ./...

  tidy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Set up Go
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version: ${{ inputs.go-version || null }}
          go-version-file: go.mod

      - name: Check go mod tidy
        run: |
          go mod tidy
          git diff --exit-code go.mod go.sum

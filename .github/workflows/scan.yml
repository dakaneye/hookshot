name: Vulnerability Scan

on:
  workflow_call:
    inputs:
      severity-cutoff:
        description: "Minimum severity to report (negligible, low, medium, high, critical)"
        type: string
        required: false
        default: "high"
      fail-build:
        description: "Fail the build on findings"
        type: boolean
        required: false
        default: false
      only-fixed:
        description: "Only report vulnerabilities with available fixes"
        type: boolean
        required: false
        default: true

permissions:
  contents: read
  security-events: write

jobs:
  scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Grype filesystem scan
        uses: anchore/scan-action@e1165082ffb1fe366ebaf02d8526e7c4989ea9d2 # v7.4.0
        id: scan
        with:
          path: "."
          fail-build: ${{ inputs.fail-build }}
          severity-cutoff: ${{ inputs.severity-cutoff }}
          only-fixed: ${{ inputs.only-fixed }}

      - name: Upload SARIF
        uses: github/codeql-action/upload-sarif@7fc1baf373eb073c686865bd453d412d506a05a2 # v3.35.1
        if: always()
        with:
          sarif_file: results.sarif

name: Node CI

on:
  workflow_call:
    inputs:
      node-version:
        description: "Node.js version"
        type: string
        required: false
        default: "22"
      build-command:
        description: "Build command (empty string to skip)"
        type: string
        required: false
        default: "npm run build"
      test-command:
        description: "Test command"
        type: string
        required: false
        default: "npm test"
      skip-test:
        description: "Skip the test step"
        type: boolean
        required: false
        default: false
      skip-lint:
        description: "Skip the lint step (placeholder, no default linter configured)"
        type: boolean
        required: false
        default: false
      apt-packages:
        description: "Space-separated apt packages to install (e.g. 'libsecret-1-dev')"
        type: string
        required: false
        default: ""

permissions:
  contents: read

jobs:
  ci:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Install apt packages
        if: inputs.apt-packages != ''
        run: sudo apt-get update && sudo apt-get install -y ${{ inputs.apt-packages }}

      - name: Set up Node.js
        uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6.3.0
        with:
          node-version: ${{ inputs.node-version }}

      - name: Install dependencies
        run: npm ci

      # workflow_call inputs are from trusted caller YAML, not user event data
      - name: Build
        if: inputs.build-command != ''
        run: ${{ inputs.build-command }}

      - name: Test
        if: ${{ !inputs.skip-test }}
        run: ${{ inputs.test-command }}

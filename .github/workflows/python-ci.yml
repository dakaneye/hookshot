name: Python CI

on:
  workflow_call:
    inputs:
      python-version:
        description: "Python version"
        type: string
        required: false
        default: "3.12"
      test-command:
        description: "Test command"
        type: string
        required: false
        default: "pytest -v --tb=short"
      lint:
        description: "Run ruff linter"
        type: boolean
        required: false
        default: true
      typecheck:
        description: "Run mypy type checking"
        type: boolean
        required: false
        default: false
      codecov:
        description: "Upload coverage to Codecov"
        type: boolean
        required: false
        default: false
    secrets:
      codecov-token:
        required: false

permissions:
  contents: read

jobs:
  ci:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Set up Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: ${{ inputs.python-version }}

      - name: Detect package manager and install
        run: |
          if [[ -f "uv.lock" ]]; then
            pip install uv
            uv sync
            echo "RUNNER=uv run" >> "$GITHUB_ENV"
          elif [[ -f "poetry.lock" ]]; then
            pip install poetry
            poetry install
            echo "RUNNER=poetry run" >> "$GITHUB_ENV"
          elif [[ -f "requirements.txt" ]]; then
            pip install -r requirements.txt
            echo "RUNNER=" >> "$GITHUB_ENV"
          elif [[ -f "pyproject.toml" ]]; then
            pip install -e ".[dev]" 2>/dev/null || pip install -e .
            echo "RUNNER=" >> "$GITHUB_ENV"
          else
            echo "RUNNER=" >> "$GITHUB_ENV"
          fi

      - name: Lint
        if: inputs.lint
        run: |
          pip install ruff
          ruff check .
          ruff format --check .

      - name: Type check
        if: inputs.typecheck
        run: |
          pip install mypy
          ${RUNNER:+$RUNNER} mypy .

      # workflow_call inputs are from trusted caller YAML, not user event data
      - name: Test
        if: inputs.codecov == false
        run: ${RUNNER:+$RUNNER} ${{ inputs.test-command }}

      - name: Test with coverage
        if: inputs.codecov
        run: |
          pip install pytest-cov
          ${RUNNER:+$RUNNER} ${{ inputs.test-command }} --cov --cov-report=xml

      - name: Upload coverage
        if: inputs.codecov
        uses: codecov/codecov-action@57e3a136b779b570ffcdbf80b3bdc90e7fab3de2 # v6.0.0
        with:
          files: coverage.xml
          fail_ci_if_error: false
          token: ${{ secrets.codecov-token }}

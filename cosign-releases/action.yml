name: "cosign-releases"
description: "Sign all GitHub Release assets with keyless Sigstore signing"
inputs:
  release-tag:
    description: "Release tag to sign assets for"
    required: true
  exclude-pattern:
    description: "Glob pattern to exclude assets from signing (e.g., '*.txt')"
    required: false
    default: ""
runs:
  using: "composite"
  steps:
    - name: Install cosign
      uses: sigstore/cosign-installer@cad07c2e89fa2edd6e2d7bab4c1aa38e53f76003 # v4.1.1

    - name: Sign release assets
      shell: bash
      env:
        GH_TOKEN: ${{ github.token }}
        RELEASE_TAG: ${{ inputs.release-tag }}
        EXCLUDE: ${{ inputs.exclude-pattern }}
      run: |
        set -Eeuo pipefail

        WORK_DIR="$(mktemp -d)"
        trap 'rm -rf "$WORK_DIR"' EXIT

        # Verify the release exists
        gh release view "$RELEASE_TAG" --json tagName > /dev/null \
          || { printf 'Error: release %s not found\n' "$RELEASE_TAG" >&2; exit 1; }

        ASSET_COUNT=0
        echo "Signing assets for release $RELEASE_TAG"

        while IFS= read -r ASSET; do
          [[ -n "$ASSET" ]] || continue
          # Skip signature and bundle files
          if [[ "$ASSET" == *.sig || "$ASSET" == *.bundle || "$ASSET" == *.pem ]]; then
            echo "Skipping signature file: $ASSET"
            continue
          fi

          # Skip excluded patterns
          if [[ -n "$EXCLUDE" ]] && [[ "$ASSET" == $EXCLUDE ]]; then
            echo "Skipping excluded: $ASSET"
            continue
          fi

          echo "Signing: $ASSET"

          # Download asset
          gh release download "$RELEASE_TAG" --pattern "$ASSET" --dir "$WORK_DIR" --clobber \
            || { printf 'Error: download failed for asset %s\n' "$ASSET" >&2; exit 1; }

          # Sign with cosign keyless OIDC — bundle is the canonical format
          cosign sign-blob --yes \
            --bundle "$WORK_DIR/${ASSET}.bundle" \
            "$WORK_DIR/$ASSET" \
            || { printf 'Error: cosign signing failed for %s\n' "$ASSET" >&2; exit 1; }

          # Upload bundle to release
          gh release upload "$RELEASE_TAG" \
            "$WORK_DIR/${ASSET}.bundle" \
            --clobber \
            || { printf 'Error: upload failed for bundle of %s\n' "$ASSET" >&2; exit 1; }

          ASSET_COUNT=$((ASSET_COUNT + 1))
          echo "Signed: $ASSET"
        done < <(gh release view "$RELEASE_TAG" --json assets --jq '.assets[].name')

        if [[ "$ASSET_COUNT" -eq 0 ]]; then
          echo "No signable assets found for release $RELEASE_TAG"
        else
          echo "Signed $ASSET_COUNT asset(s)."
        fi
